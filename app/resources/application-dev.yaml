spring:
  docker:
    compose:
      enabled: true
      file: dev/compose.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/parcelview
    driver-class-name: org.postgresql.Driver
    username: parcelview
    password: parcelview
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true