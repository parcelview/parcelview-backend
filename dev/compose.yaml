services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parcelview}
      POSTGRES_USER: ${POSTGRES_USER:-parcelview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parcelview}
    ports:
      - "5432:5432"
    volumes:
      - parcelview_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  parcelview_data: